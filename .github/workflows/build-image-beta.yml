name: Beta Images
on:
   #merge_group:
   pull_request:
     branches:
       - beta
     paths-ignore:
       - "**.md"
       - ".github/workflows/moderator.yml"
       - ".github/workflows/scorecard.yml"
   push:
      branches:
        - beta
      paths-ignore:
       - "**.md"
       - ".github/workflows/moderator.yml"
       - ".github/workflows/scorecard.yml"
   workflow_call:
   workflow_dispatch:
    inputs:
      previous_build:
        description: 'Set to 0 to manually clear rechunking plan'
        type: choice
        default: '1'
        options:
          - '0'
          - '1'

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  build-image-beta:
    name: Build Beta Images
    uses: ./.github/workflows/reusable-build.yml
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        brand_name: ["aurora"]
    with:
      image_flavors: '["main", "nvidia-open"]'
      brand_name: ${{ matrix.brand_name }}
      stream_name: beta
      previous_build: ${{ inputs.previous_build }}

