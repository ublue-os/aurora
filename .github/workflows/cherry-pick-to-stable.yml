name: Backport Merged Pull Requests
on:
  pull_request_target:
    types: [closed]

permissions: {}

jobs:
  cherry-pick:
    name: Backport Merged Pull Requests
    runs-on: ubuntu-slim
    permissions:
      contents: write # so it can comment
      pull-requests: write # so it can create pull requests

    # Only run on merged PRs with a backport label (default `label_pattern`)
    if: >
      github.event.pull_request.merged &&
      contains(toJSON(github.event.pull_request.labels.*.name), 'cherry-pick')
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # https://github.com/korthout/backport-action
      - name: Create Backport Pull Requests
        uses: korthout/backport-action@66065406958f46e82238fd59546f5a99e69e22aa # v4.5.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          target_branches: "stable-f44"
