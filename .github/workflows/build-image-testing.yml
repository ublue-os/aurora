name: Testing Images
on:
   merge_group:
   pull_request:
     branches:
       - main
     paths-ignore:
       - "**.md"
       - ".github/workflows/moderator.yml"
       - ".github/workflows/scorecard.yml"
   workflow_call:
   workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  build-image-testing:
    name: Build Testing Images
    uses: ./.github/workflows/reusable-build.yml
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        brand_name: ["aurora"]
    with:
      image_flavors: '["main", "nvidia-open"]'
      brand_name: ${{ matrix.brand_name }}
      stream_name: testing
      #kernel_pin: 6.12.15-200.fc41.x86_64
      # FIXME: MAIN has no arm builds in ublue-os/akmods yet
      # https://github.com/ublue-os/akmods/pull/440
      # architecture: '["aarch64","x86_64"]'
      architecture: '["x86_64"]'
      publish: ${{ github.event_name != 'pull_request' }}
