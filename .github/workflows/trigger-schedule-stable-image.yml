# We have this because we can't schedule builds on non-default branches
name: Trigger Stable Image Build
on:
  schedule:
    - cron: "0 1 * * TUE" # Every Tuesday at 1:15 AM
  workflow_dispatch:

permissions: {}

jobs:
  trigger-stable-build:
    runs-on: ubuntu-slim
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Trigger Stable Image Build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: stable-f44
        run: |
          gh workflow run \
            build-image-stable.yml \
            --ref "${BRANCH}"
