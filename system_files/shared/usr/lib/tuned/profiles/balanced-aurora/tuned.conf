#
# tuned configuration
#

[main]
summary = General non-specialized tuned profile with added Aurora tweaks
include = balanced

[audio]
# See 17c869d
timeout=0

[sysctl]
vm.swappiness = 180
vm.watermark_boost_factor = 0
vm.watermark_scale_factor = 125
vm.dirty_bytes = 268435456
vm.dirty_background_bytes = 134217728
vm.page-cluster = 0

[script]
script=${i:PROFILE_DIR}/script.sh
